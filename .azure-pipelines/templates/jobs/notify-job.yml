parameters:
- name: buildStatus
  type: string
  values:
  - SUCCESS
  - FAILURE

jobs:
  - job: notify_release_finished
    pool:
      vmImage: ubuntu-latest
    steps:
      - task: DownloadSecureFile@1
        name: webhook_url
        inputs:
          secureFile: mattermost_webhook_url_release_notify
      - bash: |
          set -e
          python -m venv venv
          source venv/bin/activate
          tools/pip_install.py requests
          "${BUILD_REPOSITORY_LOCALPATH}/tools/notify_mattermost.py" "${BUILD_SOURCEVERSIONAUTHOR}" $(webhook_url.secureFilePath) ${{ parameters.buildStatus }}
        displayName: Send mattermost message
