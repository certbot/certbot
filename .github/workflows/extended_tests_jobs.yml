name: Extended tests jobs
on:
  workflow_call:
    secrets:
      AWS_TEST_FARM_PEM:
        required: false
      AWS_ACCESS_KEY_ID:
        required: false
      AWS_SECRET_ACCESS_KEY:
        required: false
permissions:
  contents: read

jobs:
  test:
    name: '-' # Makes results viewing cleaner
    strategy:
      fail-fast: false
      matrix:
        PYTHON_VERSION: ['3.14']
        TOXENV:
          - isolated-acme,isolated-certbot,isolated-apache,isolated-cloudflare,isolated-digitalocean,isolated-dnsimple,isolated-dnsmadeeasy,isolated-gehirn,isolated-google,isolated-linode,isolated-luadns,isolated-nsone,isolated-ovh,isolated-rfc2136,isolated-route53,isolated-sakuracloud,isolated-nginx
          - nginx_compat
          - modification
        include:
          - PYTHON_VERSION: '3.11'
            TOXENV: py311
          - PYTHON_VERSION: '3.12'
            TOXENV: py312
          - PYTHON_VERSION: '3.13'
            TOXENV: py313
          - PYTHON_VERSION: '3.10'
            TOXENV: integration-certbot-oldest
          - PYTHON_VERSION: '3.10'
            TOXENV: integration-nginx-oldest
          - PYTHON_VERSION: '3.10'
            TOXENV: integration
          - PYTHON_VERSION: '3.11'
            TOXENV: integration
          - PYTHON_VERSION: '3.12'
            TOXENV: integration
          - PYTHON_VERSION: '3.13'
            TOXENV: integration
          # python 3.14 integration tests are not run here because they're run as
          # part of the standard test suite
          - PYTHON_VERSION: '3.12'
            TOXENV: integration-dns-rfc2136
          - PYTHON_VERSION: '3.12'
            TOXENV: test-farm-apache2
    uses: "./.github/workflows/tox_steps.yml"
    with:
      PYTHON_VERSION: "${{ matrix.PYTHON_VERSION }}"
      TOXENV: "${{ matrix.TOXENV }}"
      IMAGE_NAME: ubuntu-22.04
    secrets:
      AWS_TEST_FARM_PEM: "${{ secrets.AWS_TEST_FARM_PEM }}"
      AWS_ACCESS_KEY_ID: "${{ secrets.AWS_ACCESS_KEY_ID }}"
      AWS_SECRET_ACCESS_KEY: "${{ secrets.AWS_SECRET_ACCESS_KEY }}"
