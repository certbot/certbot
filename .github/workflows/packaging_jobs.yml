  snap_run:
    needs:
    - snap_build
    runs-on:
      - ${{ matrix.build-on }}
    strategy:
      matrix:
        include:
        # - build-for: arm64
        #   build-on: ubuntu-24.04-arm
        - build-for: armhf
          build-on: ubuntu-24.04-arm
        # - build-for: amd64
        #   build-on: ubuntu-24.04
    steps:
    - name: checkout
      uses: actions/checkout@v6.0.2
    - uses: actions/setup-python@v5.0.0
      with:
        python-version: '3.12'
    - name: Set armhf architecture if applicable
      if: matrix.build-for == 'armhf'
      run: |-
        set -e
        sudo dpkg --add-architecture "armhf"
        sudo apt-get update
        sudo apt install -y fuse3:armhf snapd:armhf
    - name: Install dependencies
      run: |-
        set -e
        # sudo apt-get update
        sudo apt-get install -y --no-install-recommends nginx-light # snapd
        python3 -m venv venv
        venv/bin/python tools/pip_install.py -U tox
    - name: Retrieve Certbot snaps
      uses: actions/download-artifact@v8.0.1
      with:
        name: snaps_${{ matrix.build-for }}
        github_token: "${{ secrets.GITHUB_TOKEN }}"
        path: "${{ github.workspace }}/snap"
        repo: "${{ github.repository }}"
    - name: Install Certbot snap
      run: |-
        set -e
        sudo snap install --dangerous --classic snap/certbot_*.snap
    - name: Run tox
      run: |-
        set -e
        venv/bin/python -m tox run -e integration-external,apacheconftest-external-with-pebble

